services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: researchswarm-backend
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      RESEARCHSWARM_DEMO_MODE: ${RESEARCHSWARM_DEMO_MODE:-false}
    ports:
      - "8000:8000"
    depends_on:
      - redis
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: researchswarm-frontend
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
      VITE_DEMO_MODE: ${VITE_DEMO_MODE:-true}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: researchswarm-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: ["redis-server", "--appendonly", "yes"]
    restart: unless-stopped

volumes:
  redis-data:
